name: 01 Auto Create PR to Default Branch

on:
  push:
    branches:
      - 'dev-*'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pull-request:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: temp-pr-${{ github.ref_name }}
          base: ${{ github.event.repository.default_branch }}
          title: "Auto PR: ${{ github.ref_name }} → ${{ github.event.repository.default_branch }}"
          body: |
            This PR was automatically created from branch `${{ github.ref_name }}`.

            - Source Branch: `${{ github.ref_name }}`
            - Target Branch: `${{ github.event.repository.default_branch }}`

          commit-message: "Auto PR from ${{ github.ref_name }}"
          delete-branch: true